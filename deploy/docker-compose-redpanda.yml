# =============================================================================
# CTT Phase 6 — Production Stack Orchestration + L5 Macro Federation
# Redpanda variant: replaces JVM Kafka + Zookeeper with Redpanda (~200 MB, no JVM)
# Usage: docker-compose -f deploy/docker-compose-redpanda.yml up --build
# =============================================================================

services:
  engine:
    build:
      context: ..
      dockerfile: services/l1-engine/Dockerfile
    container_name: ctt-engine
    ports:
      - "5555:5555"
      - "27750:27750"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5555"]
      interval: 5s
      timeout: 2s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  harvester:
    build:
      context: ..
      dockerfile: services/data-pipeline/ingestor/Dockerfile
    container_name: ctt-harvester
    environment:
      - HARVESTER_MODE=mock
      - HARVESTER_POLL_INTERVAL=5
      - CTT_HARVESTER_HOST=harvester
      - CTT_INTERPRETER_HOST=interpreter
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5560"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  interpreter:
    build:
      context: ..
      dockerfile: services/data-pipeline/interpreter/Dockerfile
    container_name: ctt-interpreter
    environment:
      - CTT_HARVESTER_HOST=harvester
      - CTT_INTERPRETER_HOST=interpreter
      - CTT_FUSION_HOST=fusion
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5561"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  fusion:
    build:
      context: ..
      dockerfile: services/data-pipeline/fusion/Dockerfile
    container_name: ctt-fusion
    ports:
      - "5556:5556"
    environment:
      - CTT_INTERPRETER_HOST=interpreter
      - CTT_FUSION_HOST=fusion
      - CTT_L1_ENGINE_HOST=engine
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5556"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: services/l2-bridge/Dockerfile
    container_name: ctt-dashboard
    ports:
      - "5001:5001"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_POLICY_HOST=federation-bridge
    networks:
      - ctt
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=2)" || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ctt-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=marcusolsson-json-datasource
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ctt-admin-2026
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_storage:/var/lib/grafana
      - ../deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ctt
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 6 — Redpanda Core (Kafka API-compatible, no JVM, no Zookeeper)
  # ---------------------------------------------------------------------------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: ctt-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - ctt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  audit-logger:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-audit-logger
    command: python audit_logger.py
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_CITY_ID=city-01
      - CTT_REGION=uk-southeast
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_PERTURBATION_TOPIC=ctt.perturbation.applied
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt
    depends_on:
      redpanda:
        condition: service_started
      engine:
        condition: service_healthy
      fusion:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  federation-bridge:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-federation-bridge
    command: python federation_bridge.py
    ports:
      - "5563:5563"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_CITY_ID=city-01
      - CTT_REGION=uk-southeast
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_POLICY_TOPIC=ctt.policy.structural
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt
    depends_on:
      redpanda:
        condition: service_started
      engine:
        condition: service_healthy
      fusion:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ctt:
    driver: bridge

volumes:
  grafana_storage:
    driver: local
