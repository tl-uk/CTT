# =============================================================================
# CTT Phase 13-14: SUMO Spatial + BDI Cognitive Stack
# Overlay: deploy/docker-compose-sumo.yml
# Usage: docker-compose -f deploy/docker-compose.yml -f deploy/docker-compose-sumo.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Phase 14a: SUMO Zone Server (one per corridor)
  # MMOG Analogy: Physics server for zone "m20_corridor"
  # Scale: One container per corridor; can run on edge nodes
  # ---------------------------------------------------------------------------
  sumo-m20:
    image: ctt-sumo:${CTT_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/l4-spatial/Dockerfile
    container_name: ctt-sumo-m20
    environment:
      - CTT_CORRIDOR_ID=m20_corridor
      - CTT_SUMO_CONFIG=/app/deploy/osm-networks/m20_corridor/m20_corridor.sumocfg
      - CTT_ZMQ_TELEMETRY=tcp://ctt-engine:5555
      - CTT_ZMQ_SUMO_PUB=tcp://*:5557
      - CTT_KAFKA=kafka:29092
      - PYTHONPATH=/app/services/config:/app/services/l4-spatial:/usr/share/sumo/tools
    ports:
      - "5557:5557"
    volumes:
      - ../services/l4-spatial/:/app/services/l4-spatial/:ro
      - ../services/config/:/app/services/config/:ro
      - ../deploy/osm-networks/:/app/deploy/osm-networks/:rw
    networks:
      - ctt
    depends_on:
      engine:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # Additional corridor instances (commented out — enable as needed)
  # sumo-a20:
  #   extends: sumo-m20
  #   container_name: ctt-sumo-a20
  #   environment:
  #     - CTT_CORRIDOR_ID=a20_charging
  #   ports:
  #     - "5558:5557"

  # ---------------------------------------------------------------------------
  # Phase 13a: BDI Engine (integrated into ABDT Cache)
  # Replaces standalone abdt-cache with BDI-enabled version
  # ---------------------------------------------------------------------------
  abdt-cache:
    image: ctt-kg:${CTT_IMAGE_TAG:-latest}
    container_name: ctt-abdt-cache
    command: python services/l7-kg/abdt_agent_cache_v2.py
    environment:
      - CTT_KAFKA=kafka:29092
      - CTT_ENABLE_BDI=1
      - PYTHONPATH=/app/services/config:/app/services/l7-kg
    volumes:
      - ../services/l7-kg/abdt_agent_cache_v2.py:/app/services/l7-kg/abdt_agent_cache_v2.py:ro
      - ../services/l7-kg/bdi_engine.py:/app/services/l7-kg/bdi_engine.py:ro
      - ../services/l7-kg/coalition_engine.py:/app/services/l7-kg/coalition_engine.py:ro
      - ../services/config:/app/services/config:ro
    depends_on:
      kafka:
        condition: service_started
      l7-kg:
        condition: service_healthy
    networks:
      - ctt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

