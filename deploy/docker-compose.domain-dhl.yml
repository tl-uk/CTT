# =============================================================================
# CTT Multi-Stakeholder Domain: domain-dhl
# DHL Express — logistics and last-mile freight
# Generated by scripts/generate_domain_compose.py
# DO NOT EDIT MANUALLY — regenerate from domains.yaml
# =============================================================================
# Port mapping rule: HOST_PORT+offset:CONTAINER_PORT (base)
# Services internally bind to base ports; only external access shifts.

services:
  engine-domain-dhl:
    build:
      context: ..
      dockerfile: services/l1-engine/Dockerfile
    container_name: ctt-engine-domain-dhl
    ports:
      - "5557:5555"
      - "27752:27750"
    environment:
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5555"]
      interval: 5s
      timeout: 2s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  harvester-domain-dhl:
    build:
      context: ..
      dockerfile: services/data-pipeline/ingestor/Dockerfile
    container_name: ctt-harvester-domain-dhl
    environment:
      - HARVESTER_MODE=mock
      - HARVESTER_POLL_INTERVAL=5
      - CTT_HARVESTER_HOST=harvester-domain-dhl
      - CTT_INTERPRETER_HOST=interpreter-domain-dhl
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5560"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  interpreter-domain-dhl:
    build:
      context: ..
      dockerfile: services/data-pipeline/interpreter/Dockerfile
    container_name: ctt-interpreter-domain-dhl
    environment:
      - CTT_HARVESTER_HOST=harvester-domain-dhl
      - CTT_INTERPRETER_HOST=interpreter-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5561"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  fusion-domain-dhl:
    build:
      context: ..
      dockerfile: services/data-pipeline/fusion/Dockerfile
    container_name: ctt-fusion-domain-dhl
    ports:
      - "5558:5556"
    environment:
      - CTT_INTERPRETER_HOST=interpreter-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5556"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dashboard-domain-dhl:
    build:
      context: ..
      dockerfile: services/l2-bridge/Dockerfile
    container_name: ctt-dashboard-domain-dhl
    ports:
      - "5003:5001"
    environment:
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_POLICY_HOST=federation-bridge-domain-dhl
      - CTT_TACTICAL_HOST=orchestrator-domain-dhl
      - PYTHONPATH=/app/services/config:/app/services/l2-bridge
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=2)" || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    restart: unless-stopped

  orchestrator-domain-dhl:
    build:
      context: ..
      dockerfile: services/l2-orchestrator/Dockerfile
    container_name: ctt-orchestrator-domain-dhl
    ports:
      - "5566:5564"
    environment:
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_POLICY_HOST=federation-bridge-domain-dhl
      - CTT_TACTICAL_HOST=orchestrator-domain-dhl
      - PYTHONPATH=/app/services/config:/app/services/l2-orchestrator
      - CTT_DOMAIN_ID=domain-dhl
    networks:
      - ctt-dhl
    depends_on:
      engine-domain-dhl:
        condition: service_healthy
      fusion-domain-dhl:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  grafana-domain-dhl:
    image: grafana/grafana:latest
    container_name: ctt-grafana-domain-dhl
    ports:
      - "3002:3000"
    environment:
      - GF_INSTALL_PLUGINS=marcusolsson-json-datasource
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ctt-admin-2026
      - GF_SERVER_ROOT_URL=http://localhost:3002
    volumes:
      - grafana_storage_domain-dhl:/var/lib/grafana
      - ../deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ctt-dhl
    depends_on:
      dashboard-domain-dhl:
        condition: service_healthy
    restart: unless-stopped

  zookeeper-domain-dhl:
    image: confluentinc/cp-zookeeper:latest
    container_name: ctt-zookeeper-domain-dhl
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ctt-dhl
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  kafka-domain-dhl:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ctt-kafka-domain-dhl
    depends_on:
      - zookeeper-domain-dhl
    ports:
      - "9094:9092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-domain-dhl:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-domain-dhl:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: -Xmx384M -Xms384M
    networks:
      - ctt-dhl
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  audit-logger-domain-dhl:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-audit-logger-domain-dhl
    command: python audit_logger.py
    environment:
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_CITY_ID=city-dhl
      - CTT_REGION=uk-midlands
      - CTT_DOMAIN_ID=domain-dhl
      - KAFKA_BOOTSTRAP_SERVERS=kafka-domain-dhl:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_PERTURBATION_TOPIC=ctt.perturbation.applied
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro-domain-dhl
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt-dhl
    depends_on:
      kafka-domain-dhl:
        condition: service_started
      engine-domain-dhl:
        condition: service_healthy
      fusion-domain-dhl:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  federation-bridge-domain-dhl:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-federation-bridge-domain-dhl
    command: python federation_bridge.py
    ports:
      - "5565:5563"
    environment:
      - CTT_L1_ENGINE_HOST=engine-domain-dhl
      - CTT_FUSION_HOST=fusion-domain-dhl
      - CTT_CITY_ID=city-dhl
      - CTT_REGION=uk-midlands
      - CTT_DOMAIN_ID=domain-dhl
      - CTT_FEDERATION_PEER_DOMAIN_DFT=
      - KAFKA_BOOTSTRAP_SERVERS=kafka-domain-dhl:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_POLICY_TOPIC=ctt.policy.structural
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro-domain-dhl
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt-dhl
      # Shared cross-domain federation backbone
      - ctt-federation
    depends_on:
      kafka-domain-dhl:
        condition: service_started
      engine-domain-dhl:
        condition: service_healthy
      fusion-domain-dhl:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ctt-dhl:
    driver: bridge
  ctt-federation:
    driver: bridge
    name: ctt-federation

volumes:
  grafana_storage_domain-dhl:
    driver: local
