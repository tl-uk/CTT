# =============================================================================
# CTT Phase 6 — Production Stack Orchestration + L5 Macro Federation
# Location: deploy/docker-compose.yml
# Usage: docker-compose -f deploy/docker-compose.yml up --build
# =============================================================================

services:
  engine:
    build:
      context: ..
      dockerfile: services/l1-engine/Dockerfile
    container_name: ctt-engine
    ports:
      - "5555:5555"
      - "27750:27750"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5555"]
      interval: 5s
      timeout: 2s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  harvester:
    build:
      context: ..
      dockerfile: services/data-pipeline/ingestor/Dockerfile
    container_name: ctt-harvester
    environment:
      - HARVESTER_MODE=mock
      - HARVESTER_POLL_INTERVAL=5
      - CTT_HARVESTER_HOST=harvester
      - CTT_INTERPRETER_HOST=interpreter
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5560"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  interpreter:
    build:
      context: ..
      dockerfile: services/data-pipeline/interpreter/Dockerfile
    container_name: ctt-interpreter
    environment:
      - CTT_HARVESTER_HOST=harvester
      - CTT_INTERPRETER_HOST=interpreter
      - CTT_FUSION_HOST=fusion
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5561"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  fusion:
    build:
      context: ..
      dockerfile: services/data-pipeline/fusion/Dockerfile
    container_name: ctt-fusion
    ports:
      - "5556:5556"
    environment:
      - CTT_INTERPRETER_HOST=interpreter
      - CTT_FUSION_HOST=fusion
      - CTT_L1_ENGINE_HOST=engine
    networks:
      - ctt
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5556"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: services/l2-bridge/Dockerfile
    container_name: ctt-dashboard
    ports:
      - "5001:5001"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_POLICY_HOST=federation-bridge
    networks:
      - ctt
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=2)" || exit 1
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 6 — L2 Orchestrator (separate container for clean maintenance)
  # Shares l2-bridge image; overrides CMD to run orchestrator.py
  # ---------------------------------------------------------------------------
  # orchestrator:
  #   build:
  #     context: ..
  #     dockerfile: services/l2-bridge/Dockerfile
  #   container_name: ctt-orchestrator
  #   command: python orchestrator.py
  #   environment:
  #     - CTT_L1_ENGINE_HOST=engine
  #     - CTT_FUSION_HOST=fusion
  #     - CTT_POLICY_HOST=federation-bridge
  #   networks:
  #     - ctt
  #   depends_on:
  #     engine:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: ctt-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=marcusolsson-json-datasource
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ctt-admin-2026
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_storage:/var/lib/grafana
      - ../deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - ctt
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Phase 6 — Kafka Core (Zookeeper mode — stable on Colima)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: ctt-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ctt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ctt-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: -Xmx384M -Xms384M
    networks:
      - ctt
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  audit-logger:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-audit-logger
    command: python audit_logger.py
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_CITY_ID=city-01
      - CTT_REGION=uk-southeast
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_PERTURBATION_TOPIC=ctt.perturbation.applied
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt
    depends_on:
      kafka:
        condition: service_started
      engine:
        condition: service_healthy
      fusion:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  federation-bridge:
    build:
      context: ..
      dockerfile: services/l5-macro/Dockerfile
    container_name: ctt-federation-bridge
    command: python federation_bridge.py
    ports:
      - "5563:5563"
    environment:
      - CTT_L1_ENGINE_HOST=engine
      - CTT_FUSION_HOST=fusion
      - CTT_CITY_ID=city-01
      - CTT_REGION=uk-southeast
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TELEMETRY_TOPIC=ctt.telemetry.raw
      - KAFKA_POLICY_TOPIC=ctt.policy.structural
      - KAFKA_CONSUMER_GROUP=ctt-l5-macro
      - PYTHONPATH=/app/services/config:/app/services/l5-macro
    networks:
      - ctt
    depends_on:
      kafka:
        condition: service_started
      engine:
        condition: service_healthy
      fusion:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  ctt:
    driver: bridge

volumes:
  grafana_storage:
    driver: local