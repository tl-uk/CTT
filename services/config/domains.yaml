# services/config/domains.yaml
# CTT Multi-Stakeholder Federation Registry
# Each domain is an independent CTT instance with its own data sovereignty.
# Domains federate via ZMQ without changing internal schemas or infrastructure.
#
# Usage:
#   python scripts/generate_domain_compose.py --domain domain-dhl
#   docker-compose -f deploy/docker-compose.domain-dhl.yml up -d

domains:
  domain-dft:
    description: "Department for Transport — national oversight and audit"
    city_id: city-01
    region: uk-southeast
    port_offset: 0
    network: ctt
    # Base domain — no federation peers defined (it is the root observer)

  domain-dhl:
    description: "DHL Express — logistics and last-mile freight"
    city_id: city-dhl
    region: uk-midlands
    port_offset: 2
    network: ctt-dhl
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
        notes: "Subscribe to DfT structural policies (toll discounts, congestion charges)"

  domain-network-rail:
    description: "Network Rail — intermodal rail freight and passenger"
    city_id: city-rail
    region: uk-north
    port_offset: 4
    network: ctt-rail
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
      - target: domain-dhl
        protocol: zmq_sub
        address: tcp://host.docker.internal:5567
        topic: ctt.telemetry.raw
        notes: "Monitor DHL freight handoffs at rail terminals"

  domain-tesco:
    description: "Tesco Supply Chain — grocery distribution fleet"
    city_id: city-tesco
    region: uk-southeast
    port_offset: 6
    network: ctt-tesco
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
      - target: domain-dhl
        protocol: zmq_sub
        address: tcp://host.docker.internal:5567
        topic: ctt.policy.structural
        notes: "Align with DHL on shared urban depot policies"

  domain-nhs:
    description: "NHS Logistics — medical supply chain and emergency vehicles"
    city_id: city-nhs
    region: uk-london
    port_offset: 8
    network: ctt-nhs
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
        notes: "Emergency vehicle priority routing from DfT"

  domain-pod:
    description: "Port of Dover — RORO freight decarbonisation and terminal operations"
    city_id: city-pod
    region: uk-southeast
    port_offset: 10
    network: ctt-pod
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
        notes: "DfT national policy for terminal access charging"
      - target: domain-nhs
        protocol: zmq_sub
        address: tcp://host.docker.internal:5571
        topic: ctt.belief.health
        notes: "Childhood asthma risk from idling emissions at terminal gate"
      - target: domain-met-office
        protocol: zmq_sub
        address: tcp://host.docker.internal:5573
        topic: ctt.belief.climate
        notes: "Heatwave warnings for queued HGV driver welfare"

  domain-nhs:
    description: "NHS England — health outcomes from transport decarbonisation"
    city_id: city-nhs
    region: uk-london
    port_offset: 12
    network: ctt-nhs
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
      - target: domain-pod
        protocol: zmq_sub
        address: tcp://host.docker.internal:5573
        topic: ctt.telemetry.raw
        notes: "Observe PoD terminal emissions for respiratory health modelling"
      - target: domain-beis
        protocol: zmq_sub
        address: tcp://host.docker.internal:5575
        topic: ctt.belief.economic
        notes: "Job displacement health impacts from retraining programmes"

  domain-beis:
    description: "BEIS — economic externalities from modal shift and employment elasticity"
    city_id: city-beis
    region: uk-london
    port_offset: 14
    network: ctt-beis
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
      - target: domain-pod
        protocol: zmq_sub
        address: tcp://host.docker.internal:5573
        topic: ctt.telemetry.raw
        notes: "Customs parking displacement by EV chargers — short-sea freight job losses"
      - target: domain-nhs
        protocol: zmq_sub
        address: tcp://host.docker.internal:5571
        topic: ctt.belief.health
        notes: "QALY data for cost-benefit of decarbonisation interventions"

  domain-met-office:
    description: "Met Office — climate adaptation and extreme weather infrastructure risk"
    city_id: city-met
    region: uk-exeter
    port_offset: 16
    network: ctt-met
    federation_peers:
      - target: domain-dft
        protocol: zmq_sub
        address: tcp://host.docker.internal:5563
        topic: ctt.policy.structural
      - target: domain-pod
        protocol: zmq_sub
        address: tcp://host.docker.internal:5573
        topic: ctt.telemetry.raw
        notes: "Summer heatwave impacts on queued HGV driver welfare and infrastructure"

# Base ports (domain-dft uses these directly)
# port_offset shifts ALL ports by this amount:
#   engine_telemetry: 5555 + offset
#   fusion_pub:       5556 + offset
#   harvester_pub:    5560 + offset (internal only)
#   interpreter_pub:  5561 + offset (internal only)
#   policy_pub:       5563 + offset
#   tactical_pub:     5564 + offset
#   kafka_broker:     9092 + offset
#   dashboard_rest:   5001 + offset
#   grafana:          3000 + offset
#
# Phase 7 domain offsets:
#   domain-dft:        0  (base)
#   domain-dhl:        2
#   domain-network-rail: 4
#   domain-tesco:      6
#   domain-nhs:        8  → updated to 12 in Phase 7
#   domain-pod:       10
#   domain-nhs:       12
#   domain-beis:      14
#   domain-met-office: 16